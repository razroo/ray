name: Deploy gateway to VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
      config_path:
        description: Repo-relative Ray config to install on the VPS
        required: false
        default: ./examples/config/ray.sub1b.public.json
  push:
    branches: [main]
    paths:
      - apps/**
      - packages/**
      - examples/config/**
      - examples/deploy/vps/**
      - package.json
      - bun.lock
      - scripts/model-stage.ts
      - tsconfig.base.json
      - tsconfig.build.json
      - .github/workflows/deploy-vps.yml

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ray-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.RAY_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    env:
      RAY_DEPLOY_HOST: ${{ secrets.RAY_DEPLOY_HOST }}
      RAY_DEPLOY_SSH_KEY: ${{ secrets.RAY_DEPLOY_SSH_KEY }}
      RAY_DEPLOY_KNOWN_HOSTS: ${{ secrets.RAY_DEPLOY_KNOWN_HOSTS }}
      RAY_ENV_FILE_CONTENTS: ${{ secrets.RAY_ENV_FILE_CONTENTS }}
      RAY_CONFIG_JSON: ${{ secrets.RAY_CONFIG_JSON }}
      RAY_DEPLOY_SSH_USER: ${{ vars.RAY_DEPLOY_SSH_USER }}
      RAY_DEPLOY_SSH_PORT: ${{ vars.RAY_DEPLOY_SSH_PORT }}
      RAY_DEPLOY_SERVICE_USER: ${{ vars.RAY_DEPLOY_SERVICE_USER }}
      RAY_DEPLOY_DOMAIN: ${{ vars.RAY_DEPLOY_DOMAIN }}
      RAY_DEPLOY_MEMORY_MIB: ${{ vars.RAY_DEPLOY_MEMORY_MIB }}
      RAY_DEPLOY_MIN_FREE_STORAGE_MIB: ${{ vars.RAY_DEPLOY_MIN_FREE_STORAGE_MIB }}
      RAY_DEPLOY_INSTALL_CADDY: ${{ vars.RAY_DEPLOY_INSTALL_CADDY }}
      RAY_CONFIG_PATH_VAR: ${{ vars.RAY_CONFIG_PATH }}
      RAY_GATEWAY_RUNTIME_BINARY: ${{ vars.RAY_GATEWAY_RUNTIME_BINARY }}
      RAY_DEPLOY_CADDY_BINARY: ${{ vars.RAY_DEPLOY_CADDY_BINARY }}
      RAY_DEPLOY_READY_TIMEOUT_SECONDS: ${{ vars.RAY_DEPLOY_READY_TIMEOUT_SECONDS }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Verify deploy secrets are present
        run: |
          set -euo pipefail
          for key in RAY_DEPLOY_HOST RAY_DEPLOY_SSH_KEY RAY_DEPLOY_KNOWN_HOSTS; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key is required for VPS deployment."
              exit 1
            fi
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Resolve config and health port
        id: settings
        env:
          CONFIG_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.config_path || '' }}
        run: |
          set -euo pipefail
          CONFIG_SOURCE="repo"
          CONFIG_PATH="${CONFIG_INPUT:-${RAY_CONFIG_PATH_VAR:-./examples/config/ray.sub1b.public.json}}"
          SSH_PORT_INPUT="${RAY_DEPLOY_SSH_PORT:-22}"
          SSH_USER_INPUT="${RAY_DEPLOY_SSH_USER:-root}"

          SSH_PORT=$(SSH_PORT="$SSH_PORT_INPUT" bun --eval '
          import { parseDeploySshPort } from "./packages/deploy/dist/cli.js";

          try {
            process.stdout.write(String(parseDeploySshPort(process.env.SSH_PORT ?? "", "RAY_DEPLOY_SSH_PORT")));
          } catch (error) {
            process.stderr.write(
              `::error::${error instanceof Error ? error.message : String(error)}\n`,
            );
            process.exit(1);
          }
          ')
          SSH_USER=$(SSH_USER="$SSH_USER_INPUT" bun --eval '
          import { parseDeploySshUser } from "./packages/deploy/dist/cli.js";

          try {
            process.stdout.write(parseDeploySshUser(process.env.SSH_USER ?? "", "RAY_DEPLOY_SSH_USER"));
          } catch (error) {
            process.stderr.write(
              `::error::${error instanceof Error ? error.message : String(error)}\n`,
            );
            process.exit(1);
          }
          ')

          if [ -n "${RAY_CONFIG_JSON:-}" ]; then
            printf '%s\n' "$RAY_CONFIG_JSON" > .ray-deploy-config.json
            CONFIG_PATH=".ray-deploy-config.json"
            CONFIG_SOURCE="secret"
            CONFIG_REL=""
          else
            CONFIG_PATH_SETTINGS=$(CONFIG_PATH="$CONFIG_PATH" bun --eval '
            import { normalizeRepoConfigPath } from "./packages/deploy/dist/cli.js";

            try {
              process.stdout.write(
                JSON.stringify(normalizeRepoConfigPath(process.env.CONFIG_PATH ?? "", "RAY_CONFIG_PATH")),
              );
            } catch (error) {
              process.stderr.write(
                `::error::${error instanceof Error ? error.message : String(error)}\n`,
              );
              process.exit(1);
            }
            ')
            CONFIG_PATH=$(CONFIG_PATH_SETTINGS="$CONFIG_PATH_SETTINGS" bun --print 'JSON.parse(process.env.CONFIG_PATH_SETTINGS).configPath')
            CONFIG_REL=$(CONFIG_PATH_SETTINGS="$CONFIG_PATH_SETTINGS" bun --print 'JSON.parse(process.env.CONFIG_PATH_SETTINGS).configRel')

            if [ ! -f "$CONFIG_PATH" ]; then
              echo "::error::Config file not found: $CONFIG_PATH"
              exit 1
            fi
          fi

          DEPLOY_SETTINGS=$(CONFIG_PATH="$CONFIG_PATH" bun --eval '
          import { loadRayConfig, resolveAuthApiKeys } from "./packages/config/dist/index.js";
          import {
            normalizeCaddyBinaryPath,
            normalizeGatewayRuntimeBinaryPath,
            parseEnvironmentFile,
            parseDeployReadyTimeoutSeconds,
          } from "./packages/deploy/dist/cli.js";

          const readNonEmpty = (value) =>
            typeof value === "string" && value.trim().length > 0 ? value : undefined;
          const fail = (message) => {
            process.stderr.write(`::error::${message}\n`);
            process.exit(1);
          };
          const parseOptionalBoolean = (value, label) => {
            const raw = readNonEmpty(value);
            if (raw === undefined) {
              return undefined;
            }

            if (raw === "true") {
              return true;
            }

            if (raw === "false") {
              return false;
            }

            fail(`${label} must be true or false.`);
          };
          const parseOptionalPositiveInteger = (value, label) => {
            const raw = readNonEmpty(value);
            if (raw === undefined) {
              return undefined;
            }

            const parsed = Number(raw.trim());
            if (!/^\d+$/.test(raw.trim()) || !Number.isSafeInteger(parsed) || parsed <= 0) {
              fail(`${label} must be a positive integer`);
            }

            return String(parsed);
          };
          const parseOptionalNonNegativeInteger = (value, label) => {
            const raw = readNonEmpty(value);
            if (raw === undefined) {
              return undefined;
            }

            const parsed = Number(raw.trim());
            if (!/^\d+$/.test(raw.trim()) || !Number.isSafeInteger(parsed)) {
              fail(`${label} must be a non-negative integer`);
            }

            return String(parsed);
          };
          const publicCaddyHost = (siteAddress) => {
            const withoutScheme = siteAddress
              .toLowerCase()
              .replace(/^http:\/\//, "")
              .replace(/^https:\/\//, "");
            const authority = withoutScheme.split("/")[0] ?? "";
            if (authority.startsWith("[") && authority.includes("]")) {
              return authority.slice(1, authority.indexOf("]"));
            }

            const colonCount = (authority.match(/:/g) ?? []).length;
            return colonCount === 1 ? authority.slice(0, authority.indexOf(":")) : authority;
          };

          const envOverrides = process.env.RAY_ENV_FILE_CONTENTS
            ? parseEnvironmentFile(process.env.RAY_ENV_FILE_CONTENTS)
            : {};
          const mergedEnv = {
            ...process.env,
            ...envOverrides,
          };
          const rawCaddyBinary =
            readNonEmpty(envOverrides.RAY_DEPLOY_CADDY_BINARY) ??
            readNonEmpty(process.env.RAY_DEPLOY_CADDY_BINARY);
          const rawGatewayRuntimeBinary =
            readNonEmpty(envOverrides.RAY_GATEWAY_RUNTIME_BINARY) ??
            readNonEmpty(process.env.RAY_GATEWAY_RUNTIME_BINARY) ??
            "/usr/local/bin/bun";
          const deployDomain =
            readNonEmpty(envOverrides.RAY_DEPLOY_DOMAIN) ??
            readNonEmpty(process.env.RAY_DEPLOY_DOMAIN) ??
            "ray.local";
          const installCaddy =
            parseOptionalBoolean(
              envOverrides.RAY_DEPLOY_INSTALL_CADDY,
              "RAY_DEPLOY_INSTALL_CADDY",
            ) ??
            parseOptionalBoolean(
              process.env.RAY_DEPLOY_INSTALL_CADDY,
              "RAY_DEPLOY_INSTALL_CADDY",
            ) ??
            false;
          const deployMemoryMiB =
            parseOptionalPositiveInteger(
              envOverrides.RAY_DEPLOY_MEMORY_MIB,
              "RAY_DEPLOY_MEMORY_MIB",
            ) ??
            parseOptionalPositiveInteger(
              process.env.RAY_DEPLOY_MEMORY_MIB,
              "RAY_DEPLOY_MEMORY_MIB",
            ) ??
            "";
          const deployMinFreeStorageMiB =
            parseOptionalNonNegativeInteger(
              envOverrides.RAY_DEPLOY_MIN_FREE_STORAGE_MIB,
              "RAY_DEPLOY_MIN_FREE_STORAGE_MIB",
            ) ??
            parseOptionalNonNegativeInteger(
              process.env.RAY_DEPLOY_MIN_FREE_STORAGE_MIB,
              "RAY_DEPLOY_MIN_FREE_STORAGE_MIB",
            ) ??
            "1024";
          const rawReadyTimeoutSeconds =
            readNonEmpty(envOverrides.RAY_DEPLOY_READY_TIMEOUT_SECONDS) ??
            readNonEmpty(process.env.RAY_DEPLOY_READY_TIMEOUT_SECONDS) ??
            "120";
          let readyTimeoutSeconds = 120;
          try {
            readyTimeoutSeconds = parseDeployReadyTimeoutSeconds(
              rawReadyTimeoutSeconds,
              "RAY_DEPLOY_READY_TIMEOUT_SECONDS",
            );
          } catch (error) {
            fail(error instanceof Error ? error.message : String(error));
          }

          if (/[\s{}]/.test(deployDomain)) {
            fail(
              "RAY_DEPLOY_DOMAIN must be a non-empty Caddy site address without whitespace or braces.",
            );
          }

          if (installCaddy) {
            const deployDomainHost = publicCaddyHost(deployDomain);
            if (
              deployDomainHost === "" ||
              deployDomainHost === "ray.local" ||
              deployDomainHost === "localhost" ||
              deployDomainHost.endsWith(".local") ||
              deployDomainHost.startsWith("127.") ||
              deployDomainHost === "::1" ||
              deployDomainHost === "0:0:0:0:0:0:0:1"
            ) {
              fail(
                "RAY_DEPLOY_INSTALL_CADDY=true requires RAY_DEPLOY_DOMAIN to be a real public DNS name, not a local placeholder.",
              );
            }
          }

          let gatewayRuntimeBinary = "";
          try {
            gatewayRuntimeBinary = normalizeGatewayRuntimeBinaryPath(
              rawGatewayRuntimeBinary,
              "RAY_GATEWAY_RUNTIME_BINARY",
            );
          } catch (error) {
            process.stderr.write(
              `::error::${error instanceof Error ? error.message : String(error)}\n`,
            );
            process.exit(1);
          }

          let caddyBinary = "";
          if (rawCaddyBinary) {
            try {
              caddyBinary = normalizeCaddyBinaryPath(
                rawCaddyBinary,
                "RAY_DEPLOY_CADDY_BINARY",
              );
            } catch (error) {
              process.stderr.write(
                `::error::${error instanceof Error ? error.message : String(error)}\n`,
              );
              process.exit(1);
            }
          }

          const { config } = await loadRayConfig({
            cwd: process.cwd(),
            configPath: process.env.CONFIG_PATH,
            env: mergedEnv,
          });

          try {
            resolveAuthApiKeys(config, mergedEnv);
          } catch (error) {
            process.stderr.write(
              `::error::Auth is enabled for the deploy config, but RAY_ENV_FILE_CONTENTS does not provide usable API keys: ${error instanceof Error ? error.message : String(error)}\n`,
            );
            process.exit(1);
          }

          process.stdout.write(JSON.stringify({
            healthPort: config.server.port,
            authEnabled: config.auth.enabled,
            serviceUser:
              readNonEmpty(envOverrides.RAY_DEPLOY_SERVICE_USER) ??
              readNonEmpty(process.env.RAY_DEPLOY_SERVICE_USER) ??
              "ray",
            deployDomain,
            installCaddy,
            deployMemoryMiB,
            deployMinFreeStorageMiB,
            readyTimeoutSeconds,
            gatewayRuntimeBinary,
            caddyBinary,
          }));
          ')
          HEALTH_PORT=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'JSON.parse(process.env.DEPLOY_SETTINGS).healthPort')
          AUTH_ENABLED=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'String(JSON.parse(process.env.DEPLOY_SETTINGS).authEnabled)')
          SERVICE_USER=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'JSON.parse(process.env.DEPLOY_SETTINGS).serviceUser')
          DEPLOY_DOMAIN=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'JSON.parse(process.env.DEPLOY_SETTINGS).deployDomain')
          INSTALL_CADDY=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'String(JSON.parse(process.env.DEPLOY_SETTINGS).installCaddy)')
          DEPLOY_MEMORY_MIB=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'JSON.parse(process.env.DEPLOY_SETTINGS).deployMemoryMiB ?? ""')
          DEPLOY_MIN_FREE_STORAGE_MIB=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'JSON.parse(process.env.DEPLOY_SETTINGS).deployMinFreeStorageMiB')
          READY_TIMEOUT_SECONDS=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'String(JSON.parse(process.env.DEPLOY_SETTINGS).readyTimeoutSeconds)')
          GATEWAY_RUNTIME_BINARY=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'JSON.parse(process.env.DEPLOY_SETTINGS).gatewayRuntimeBinary')
          CADDY_BINARY=$(DEPLOY_SETTINGS="$DEPLOY_SETTINGS" bun --print 'JSON.parse(process.env.DEPLOY_SETTINGS).caddyBinary ?? ""')

          SERVICE_USER=$(SERVICE_USER="$SERVICE_USER" bun --eval '
          import { parseDeployServiceUser } from "./packages/deploy/dist/cli.js";

          try {
            process.stdout.write(
              parseDeployServiceUser(process.env.SERVICE_USER ?? "", "RAY_DEPLOY_SERVICE_USER"),
            );
          } catch (error) {
            process.stderr.write(
              `::error::${error instanceof Error ? error.message : String(error)}\n`,
            );
            process.exit(1);
          }
          ')

          if [ "$INSTALL_CADDY" = "true" ] && [ "$AUTH_ENABLED" != "true" ]; then
            echo "::error::RAY_DEPLOY_INSTALL_CADDY=true exposes Ray through Caddy, but the resolved config has auth.enabled=false. Use a public config or enable RAY_AUTH_ENABLED=true."
            exit 1
          fi

          if [ "$CONFIG_SOURCE" = "secret" ]; then
            rm -f "$CONFIG_PATH"
          fi

          echo "config_path=$CONFIG_PATH" >> "$GITHUB_OUTPUT"
          echo "config_source=$CONFIG_SOURCE" >> "$GITHUB_OUTPUT"
          echo "config_rel=$CONFIG_REL" >> "$GITHUB_OUTPUT"
          echo "health_port=$HEALTH_PORT" >> "$GITHUB_OUTPUT"
          echo "auth_enabled=$AUTH_ENABLED" >> "$GITHUB_OUTPUT"
          echo "service_user=$SERVICE_USER" >> "$GITHUB_OUTPUT"
          echo "deploy_domain=$DEPLOY_DOMAIN" >> "$GITHUB_OUTPUT"
          echo "install_caddy=$INSTALL_CADDY" >> "$GITHUB_OUTPUT"
          echo "deploy_memory_mib=$DEPLOY_MEMORY_MIB" >> "$GITHUB_OUTPUT"
          echo "deploy_min_free_storage_mib=$DEPLOY_MIN_FREE_STORAGE_MIB" >> "$GITHUB_OUTPUT"
          echo "ready_timeout_seconds=$READY_TIMEOUT_SECONDS" >> "$GITHUB_OUTPUT"
          echo "gateway_runtime_binary=$GATEWAY_RUNTIME_BINARY" >> "$GITHUB_OUTPUT"
          echo "caddy_binary=$CADDY_BINARY" >> "$GITHUB_OUTPUT"
          echo "ssh_port=$SSH_PORT" >> "$GITHUB_OUTPUT"
          echo "ssh_user=$SSH_USER" >> "$GITHUB_OUTPUT"

      - name: Set up SSH
        env:
          SSH_PORT: ${{ steps.settings.outputs.ssh_port }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$RAY_DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::RAY_DEPLOY_SSH_KEY must be an unencrypted private SSH key readable by OpenSSH."
            exit 1
          fi
          printf '%s\n' "$RAY_DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          KNOWN_HOST_LOOKUP=$(RAY_DEPLOY_HOST="$RAY_DEPLOY_HOST" SSH_PORT="${SSH_PORT:-22}" bun --eval '
          import { formatDeployKnownHostLookup } from "./packages/deploy/dist/cli.js";

          try {
            process.stdout.write(
              formatDeployKnownHostLookup(
                process.env.RAY_DEPLOY_HOST ?? "",
                process.env.SSH_PORT ?? "22",
              ),
            );
          } catch (error) {
            process.stderr.write(
              `::error::${error instanceof Error ? error.message : String(error)}\n`,
            );
            process.exit(1);
          }
          ')
          if ! ssh-keygen -F "$KNOWN_HOST_LOOKUP" -f ~/.ssh/known_hosts >/dev/null; then
            echo "::error::RAY_DEPLOY_KNOWN_HOSTS must contain a host key entry for $KNOWN_HOST_LOOKUP."
            exit 1
          fi

      - name: Bootstrap remote runtime
        env:
          SSH_USER: ${{ steps.settings.outputs.ssh_user }}
          SSH_PORT: ${{ steps.settings.outputs.ssh_port }}
          SERVICE_USER: ${{ steps.settings.outputs.service_user }}
          INSTALL_CADDY: ${{ steps.settings.outputs.install_caddy }}
          CADDY_BINARY: ${{ steps.settings.outputs.caddy_binary }}
          DEPLOY_MIN_FREE_STORAGE_MIB: ${{ steps.settings.outputs.deploy_min_free_storage_mib }}
        run: |
          set -euo pipefail
          SSH_USER="${SSH_USER:-root}"
          SSH_PORT="${SSH_PORT:-22}"
          SERVICE_USER="${SERVICE_USER:-ray}"
          INSTALL_CADDY="${INSTALL_CADDY:-false}"
          CADDY_BINARY="${CADDY_BINARY:-}"
          DEPLOY_MIN_FREE_STORAGE_MIB="${DEPLOY_MIN_FREE_STORAGE_MIB:-1024}"
          TARGET="$SSH_USER@$RAY_DEPLOY_HOST"
          SSH_ARGS=(
            -i "$HOME/.ssh/deploy_key"
            -p "$SSH_PORT"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o ConnectTimeout=15
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=3
          )
          shell_quote() {
            printf "'%s'" "$(printf '%s' "$1" | sed "s/'/'\\\\''/g")"
          }

          timeout 900s ssh "${SSH_ARGS[@]}" "$TARGET" "INSTALL_CADDY=$(shell_quote "$INSTALL_CADDY") SERVICE_USER=$(shell_quote "$SERVICE_USER") CADDY_BINARY=$(shell_quote "$CADDY_BINARY") DEPLOY_MIN_FREE_STORAGE_MIB=$(shell_quote "$DEPLOY_MIN_FREE_STORAGE_MIB") bash -s" <<'ENDSSH'
          set -euo pipefail

          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then
            if ! command -v sudo >/dev/null 2>&1; then
              echo "Deploy user must be root or have sudo available."
              exit 1
            fi
            SUDO="sudo -n"
            if ! $SUDO true; then
              echo "Deploy user must be root or have passwordless sudo available."
              exit 1
            fi
          fi
          DEPLOY_USER="$(id -un)"
          DEPLOY_GROUP="$(id -gn)"
          DEPLOY_MIN_FREE_STORAGE_MIB="${DEPLOY_MIN_FREE_STORAGE_MIB:-1024}"

          validate_min_free_storage_mib() {
            case "${DEPLOY_MIN_FREE_STORAGE_MIB:-}" in
              ""|*[!0-9]*)
                echo "RAY_DEPLOY_MIN_FREE_STORAGE_MIB must be a non-negative integer."
                exit 1
                ;;
            esac
          }

          check_free_storage() {
            local target_path="$1"
            local label="$2"
            local check_path="$target_path"
            local available_mib

            if [ "$DEPLOY_MIN_FREE_STORAGE_MIB" = "0" ]; then
              return 0
            fi

            while [ ! -e "$check_path" ]; do
              local parent
              parent="$(dirname "$check_path")"
              if [ "$parent" = "$check_path" ]; then
                break
              fi
              check_path="$parent"
            done

            if ! available_mib="$(timeout 30s df -Pm "$check_path" | awk 'NR==2 {print $4}')"; then
              echo "Could not inspect free storage for $label at $target_path."
              exit 1
            fi
            case "$available_mib" in
              ""|*[!0-9]*)
                echo "Could not parse free storage for $label at $target_path."
                exit 1
                ;;
            esac
            if [ "$((10#$available_mib))" -lt "$((10#$DEPLOY_MIN_FREE_STORAGE_MIB))" ]; then
              echo "Remote deploy preflight requires at least ${DEPLOY_MIN_FREE_STORAGE_MIB} MiB free for $label at $target_path, but only ${available_mib} MiB is available on $check_path."
              exit 1
            fi
          }

          validate_min_free_storage_mib
          check_free_storage "/" "root filesystem"

          missing_packages=""
          if ! command -v curl >/dev/null 2>&1; then
            missing_packages="$missing_packages curl"
          fi
          if [ ! -s /etc/ssl/certs/ca-certificates.crt ]; then
            missing_packages="$missing_packages ca-certificates"
          fi
          if ! command -v unzip >/dev/null 2>&1; then
            missing_packages="$missing_packages unzip"
          fi
          if ! command -v rsync >/dev/null 2>&1; then
            missing_packages="$missing_packages rsync"
          fi
          if [ "${INSTALL_CADDY:-false}" = "true" ]; then
            if [ -n "${CADDY_BINARY:-}" ]; then
              if [ ! -x "$CADDY_BINARY" ] && [ "$CADDY_BINARY" = "/usr/bin/caddy" ]; then
                missing_packages="$missing_packages caddy"
              elif [ ! -x "$CADDY_BINARY" ]; then
                echo "Configured RAY_DEPLOY_CADDY_BINARY is not executable: $CADDY_BINARY"
                exit 1
              fi
            elif ! command -v caddy >/dev/null 2>&1; then
              missing_packages="$missing_packages caddy"
            fi
          fi
          if [ -n "$missing_packages" ]; then
            $SUDO env DEBIAN_FRONTEND=noninteractive timeout 300s apt-get -o Acquire::Retries=3 -o Dpkg::Lock::Timeout=60 update
            # shellcheck disable=SC2086
            $SUDO env DEBIAN_FRONTEND=noninteractive timeout 300s apt-get -o Acquire::Retries=3 -o Dpkg::Lock::Timeout=60 install -y --no-install-recommends $missing_packages
          fi

          SERVICE_USER="${SERVICE_USER:-ray}"
          case "$SERVICE_USER" in
            *[!0-9]*)
              if ! id -u "$SERVICE_USER" >/dev/null 2>&1; then
                timeout 60s $SUDO useradd --system --home /srv/ray --shell /usr/sbin/nologin "$SERVICE_USER"
              fi
              ;;
            *)
              if ! id -u "$SERVICE_USER" >/dev/null 2>&1; then
                echo "RAY_DEPLOY_SERVICE_USER numeric UID must already exist on the VPS; create the account first or use a named service user."
                exit 1
              fi
              ;;
          esac
          if ! SERVICE_GROUP="$(id -g "$SERVICE_USER")"; then
            echo "Could not resolve primary GID for RAY_DEPLOY_SERVICE_USER=$SERVICE_USER."
            exit 1
          fi

          timeout 60s $SUDO install -d -m 0755 /srv/ray /etc/ray
          timeout 60s $SUDO install -d -m 0755 -o "$SERVICE_USER" -g "$SERVICE_GROUP" /var/lib/ray /var/lib/ray/models /var/lib/ray/async-queue
          timeout 60s $SUDO chown "$DEPLOY_USER:$DEPLOY_GROUP" /srv/ray
          timeout 60s $SUDO chown "$SERVICE_USER:$SERVICE_GROUP" /var/lib/ray /var/lib/ray/models /var/lib/ray/async-queue
          check_free_storage /srv/ray "synced checkout"
          check_free_storage /var/lib/ray "Ray state"
          check_free_storage /tmp "temporary directory"
          ENDSSH

      - name: Sync repository to VPS
        env:
          SSH_USER: ${{ steps.settings.outputs.ssh_user }}
          SSH_PORT: ${{ steps.settings.outputs.ssh_port }}
        run: |
          set -euo pipefail
          SSH_USER="${SSH_USER:-root}"
          SSH_PORT="${SSH_PORT:-22}"
          TARGET="$SSH_USER@$RAY_DEPLOY_HOST"
          SSH_COMMAND="ssh -i $HOME/.ssh/deploy_key -p $SSH_PORT -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=3"

          timeout 900s rsync -az --delete \
            -e "$SSH_COMMAND" \
            --timeout=120 \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.ray' \
            --exclude '.ray-deploy-*' \
            --exclude 'node_modules' \
            ./ "$TARGET:/srv/ray/"

      - name: Install config, env, and restart service
        env:
          SSH_USER: ${{ steps.settings.outputs.ssh_user }}
          SSH_PORT: ${{ steps.settings.outputs.ssh_port }}
          CONFIG_SOURCE: ${{ steps.settings.outputs.config_source }}
          CONFIG_REL: ${{ steps.settings.outputs.config_rel }}
          HEALTH_PORT: ${{ steps.settings.outputs.health_port }}
          DEPLOY_DOMAIN: ${{ steps.settings.outputs.deploy_domain }}
          INSTALL_CADDY: ${{ steps.settings.outputs.install_caddy }}
          DEPLOY_MEMORY_MIB: ${{ steps.settings.outputs.deploy_memory_mib }}
          DEPLOY_MIN_FREE_STORAGE_MIB: ${{ steps.settings.outputs.deploy_min_free_storage_mib }}
          SERVICE_USER: ${{ steps.settings.outputs.service_user }}
          READY_TIMEOUT_SECONDS: ${{ steps.settings.outputs.ready_timeout_seconds }}
          GATEWAY_RUNTIME_BINARY: ${{ steps.settings.outputs.gateway_runtime_binary }}
          CADDY_BINARY: ${{ steps.settings.outputs.caddy_binary }}
        run: |
          set -euo pipefail
          SSH_USER="${SSH_USER:-root}"
          SSH_PORT="${SSH_PORT:-22}"
          TARGET="$SSH_USER@$RAY_DEPLOY_HOST"
          SERVICE_USER="${SERVICE_USER:-ray}"
          CADDY_BINARY="${CADDY_BINARY:-}"
          DEPLOY_MIN_FREE_STORAGE_MIB="${DEPLOY_MIN_FREE_STORAGE_MIB:-1024}"
          ENV_B64="$(printf '%s' "${RAY_ENV_FILE_CONTENTS:-}" | base64 -w 0)"
          CONFIG_B64="$(printf '%s' "${RAY_CONFIG_JSON:-}" | base64 -w 0)"
          SSH_ARGS=(
            -i "$HOME/.ssh/deploy_key"
            -p "$SSH_PORT"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o ConnectTimeout=15
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=3
          )
          shell_quote() {
            printf "'%s'" "$(printf '%s' "$1" | sed "s/'/'\\\\''/g")"
          }

          timeout 4500s ssh "${SSH_ARGS[@]}" "$TARGET" \
            "CONFIG_SOURCE=$(shell_quote "$CONFIG_SOURCE") CONFIG_REL=$(shell_quote "$CONFIG_REL") CONFIG_B64=$(shell_quote "$CONFIG_B64") HEALTH_PORT=$(shell_quote "$HEALTH_PORT") DEPLOY_DOMAIN=$(shell_quote "$DEPLOY_DOMAIN") INSTALL_CADDY=$(shell_quote "$INSTALL_CADDY") SERVICE_USER=$(shell_quote "$SERVICE_USER") READY_TIMEOUT_SECONDS=$(shell_quote "$READY_TIMEOUT_SECONDS") GATEWAY_RUNTIME_BINARY=$(shell_quote "$GATEWAY_RUNTIME_BINARY") CADDY_BINARY=$(shell_quote "$CADDY_BINARY") RAY_DEPLOY_MEMORY_MIB=$(shell_quote "${DEPLOY_MEMORY_MIB:-}") DEPLOY_MIN_FREE_STORAGE_MIB=$(shell_quote "$DEPLOY_MIN_FREE_STORAGE_MIB") ENV_B64=$(shell_quote "$ENV_B64") bash -s" <<'ENDSSH'
          set -euo pipefail

          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then
            if ! command -v sudo >/dev/null 2>&1; then
              echo "Deploy user must be root or have sudo available."
              exit 1
            fi
            SUDO="sudo -n"
            if ! $SUDO true; then
              echo "Deploy user must be root or have passwordless sudo available."
              exit 1
            fi
          fi
          SERVICE_USER="${SERVICE_USER:-ray}"
          if ! SERVICE_GROUP="$(id -g "$SERVICE_USER")"; then
            echo "Could not resolve primary GID for RAY_DEPLOY_SERVICE_USER=$SERVICE_USER."
            exit 1
          fi
          CADDY_RUNTIME="${CADDY_BINARY:-caddy}"
          CADDY_ARGS=()
          if [ -n "${CADDY_BINARY:-}" ]; then
            CADDY_ARGS=(--caddy-binary "$CADDY_BINARY")
          fi
          DEPLOY_MIN_FREE_STORAGE_MIB="${DEPLOY_MIN_FREE_STORAGE_MIB:-1024}"

          dump_service_debug() {
            unit="$1"
            echo "::group::${unit} diagnostics"
            timeout 30s $SUDO systemctl --no-pager --full status "$unit" || true
            timeout 30s $SUDO systemctl --no-pager show "$unit" \
              -p ActiveState \
              -p SubState \
              -p Result \
              -p ExecMainCode \
              -p ExecMainStatus \
              -p NRestarts \
              -p MemoryCurrent \
              -p CPUUsageNSec || true
            timeout 30s $SUDO journalctl --no-pager --output=short-iso -n 120 -u "$unit" || true
            echo "::endgroup::"
          }

          dump_ray_debug() {
            dump_service_debug ray-gateway.service
            if [ -f /etc/systemd/system/ray-llama-cpp.service ]; then
              dump_service_debug ray-llama-cpp.service
            fi
          }

          bun_version_at_least() {
            local current="$1"
            local minimum="$2"
            if ! printf '%s\n' "$current" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              return 1
            fi

            local current_major="${current%%.*}"
            local current_rest="${current#*.}"
            local current_minor="${current_rest%%.*}"
            local current_patch="${current_rest#*.}"
            local minimum_major="${minimum%%.*}"
            local minimum_rest="${minimum#*.}"
            local minimum_minor="${minimum_rest%%.*}"
            local minimum_patch="${minimum_rest#*.}"

            if [ "$((10#$current_major))" -ne "$((10#$minimum_major))" ]; then
              [ "$((10#$current_major))" -gt "$((10#$minimum_major))" ]
              return
            fi
            if [ "$((10#$current_minor))" -ne "$((10#$minimum_minor))" ]; then
              [ "$((10#$current_minor))" -gt "$((10#$minimum_minor))" ]
              return
            fi
            [ "$((10#$current_patch))" -ge "$((10#$minimum_patch))" ]
          }

          bun_runtime_version() {
            local binary="$1"
            if [ -x "$binary" ]; then
              timeout 15s "$binary" --version 2>/dev/null | head -n 1 || true
            fi
          }

          validate_min_free_storage_mib() {
            case "${DEPLOY_MIN_FREE_STORAGE_MIB:-}" in
              ""|*[!0-9]*)
                echo "RAY_DEPLOY_MIN_FREE_STORAGE_MIB must be a non-negative integer."
                exit 1
                ;;
            esac
          }

          check_free_storage() {
            local target_path="$1"
            local label="$2"
            local check_path="$target_path"
            local available_mib

            if [ "$DEPLOY_MIN_FREE_STORAGE_MIB" = "0" ]; then
              return 0
            fi

            while [ ! -e "$check_path" ]; do
              local parent
              parent="$(dirname "$check_path")"
              if [ "$parent" = "$check_path" ]; then
                break
              fi
              check_path="$parent"
            done

            if ! available_mib="$(timeout 30s df -Pm "$check_path" | awk 'NR==2 {print $4}')"; then
              echo "Could not inspect free storage for $label at $target_path."
              exit 1
            fi
            case "$available_mib" in
              ""|*[!0-9]*)
                echo "Could not parse free storage for $label at $target_path."
                exit 1
                ;;
            esac
            if [ "$((10#$available_mib))" -lt "$((10#$DEPLOY_MIN_FREE_STORAGE_MIB))" ]; then
              echo "Remote deploy preflight requires at least ${DEPLOY_MIN_FREE_STORAGE_MIB} MiB free for $label at $target_path, but only ${available_mib} MiB is available on $check_path."
              exit 1
            fi
          }

          ensure_bun_runtime() {
            local minimum_bun_version="1.3.0"
            local install_bun_version="1.3.9"
            local current_version
            current_version="$(bun_runtime_version /usr/local/bin/bun)"
            if ! bun_version_at_least "$current_version" "$minimum_bun_version"; then
              if [ -n "$current_version" ]; then
                echo "Updating /usr/local/bin/bun from $current_version to Bun ${install_bun_version}+."
              else
                echo "Installing Bun ${install_bun_version}+ at /usr/local/bin/bun."
              fi

              local candidate=""
              candidate="$(command -v bun 2>/dev/null || true)"
              if [ -n "$candidate" ] && [ "$candidate" != "/usr/local/bin/bun" ]; then
                local candidate_version
                candidate_version="$(bun_runtime_version "$candidate")"
                if bun_version_at_least "$candidate_version" "$minimum_bun_version"; then
                  timeout 60s $SUDO install -m 0755 "$candidate" /usr/local/bin/bun
                fi
              fi

              current_version="$(bun_runtime_version /usr/local/bin/bun)"
              if ! bun_version_at_least "$current_version" "$minimum_bun_version"; then
                curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 120 https://bun.sh/install | timeout 300s bash -s "bun-v${install_bun_version}"
                if [ ! -x "$HOME/.bun/bin/bun" ]; then
                  echo "Bun install completed but $HOME/.bun/bin/bun was not found."
                  exit 1
                fi
                current_version="$(bun_runtime_version "$HOME/.bun/bin/bun")"
                if ! bun_version_at_least "$current_version" "$minimum_bun_version"; then
                  echo "Bun install produced unsupported version: ${current_version:-unknown}."
                  exit 1
                fi
                timeout 60s $SUDO install -m 0755 "$HOME/.bun/bin/bun" /usr/local/bin/bun
              fi
            fi

            case "$(basename "${GATEWAY_RUNTIME_BINARY:-}" | tr '[:upper:]' '[:lower:]')" in
              bun|bun.exe)
                if [ "${GATEWAY_RUNTIME_BINARY:-}" != "/usr/local/bin/bun" ]; then
                  timeout 60s $SUDO install -D -m 0755 /usr/local/bin/bun "$GATEWAY_RUNTIME_BINARY"
                fi
                ;;
            esac
          }

          validate_min_free_storage_mib
          check_free_storage /srv/ray "synced checkout"
          check_free_storage /var/lib/ray "Ray state"
          check_free_storage /tmp "temporary directory"
          ensure_bun_runtime

          cd /srv/ray
          umask 022
          export BUN_INSTALL_CACHE_DIR="/srv/ray/.ray/bun-install-cache"
          timeout 60s mkdir -p "$BUN_INSTALL_CACHE_DIR"
          if [ -d node_modules ]; then
            timeout 120s $SUDO rm -rf node_modules
          fi
          check_free_storage "$BUN_INSTALL_CACHE_DIR" "Bun install cache"
          check_free_storage /srv/ray "Bun production install"
          timeout 300s /usr/local/bin/bun install --production --frozen-lockfile --ignore-scripts

          if [ "${CONFIG_SOURCE:-repo}" = "secret" ] && [ -n "${CONFIG_B64:-}" ]; then
            printf '%s' "$CONFIG_B64" | base64 -d | timeout 60s $SUDO install -m 0640 -o root -g "$SERVICE_GROUP" /dev/stdin /etc/ray/ray.json
          else
            timeout 60s $SUDO install -m 0640 -o root -g "$SERVICE_GROUP" "/srv/ray/$CONFIG_REL" /etc/ray/ray.json
          fi
          if [ -n "${ENV_B64:-}" ]; then
            printf '%s' "$ENV_B64" | base64 -d | timeout 60s $SUDO install -m 0600 -o root -g root /dev/stdin /etc/ray/ray.env
          else
            printf 'RAY_LOG_LEVEL=info\n' | timeout 60s $SUDO install -m 0600 -o root -g root /dev/stdin /etc/ray/ray.env
          fi

          append_ray_env_default() {
            local key="$1"
            local value="$2"
            if [ -z "${value:-}" ]; then
              return 0
            fi
            if timeout 30s $SUDO grep -Eq "^[[:space:]]*${key}[[:space:]]*=" /etc/ray/ray.env; then
              return 0
            fi
            if [ -s /etc/ray/ray.env ] && [ -n "$(timeout 30s $SUDO tail -c 1 /etc/ray/ray.env)" ]; then
              printf '\n' | timeout 60s $SUDO tee -a /etc/ray/ray.env >/dev/null
            fi
            printf '%s=%s\n' "$key" "$value" | timeout 60s $SUDO tee -a /etc/ray/ray.env >/dev/null
          }

          append_ray_env_default RAY_DEPLOY_SERVICE_USER "$SERVICE_USER"
          append_ray_env_default RAY_DEPLOY_DOMAIN "$DEPLOY_DOMAIN"
          append_ray_env_default RAY_DEPLOY_MEMORY_MIB "${RAY_DEPLOY_MEMORY_MIB:-}"
          append_ray_env_default RAY_DEPLOY_MIN_FREE_STORAGE_MIB "$DEPLOY_MIN_FREE_STORAGE_MIB"
          append_ray_env_default RAY_DEPLOY_READY_TIMEOUT_SECONDS "$READY_TIMEOUT_SECONDS"
          append_ray_env_default RAY_GATEWAY_RUNTIME_BINARY "$GATEWAY_RUNTIME_BINARY"
          append_ray_env_default RAY_DEPLOY_CADDY_BINARY "${CADDY_BINARY:-}"
          timeout 60s $SUDO chmod 600 /etc/ray/ray.env

          LLAMA_CONFIG_STATUS=0
          timeout 30s $SUDO /usr/local/bin/bun --eval '
          import { readFileSync, statSync } from "node:fs";
          import { loadRayConfig } from "/srv/ray/packages/config/dist/index.js";
          import { parseEnvironmentFile } from "/srv/ray/packages/deploy/dist/cli.js";

          const MAX_RAY_ENV_FILE_BYTES = 64 * 1024;
          function readRayEnvFileBounded(filePath) {
            const stats = statSync(filePath);
            if (!stats.isFile()) {
              throw new Error(`Ray env path must be a file: ${filePath}`);
            }
            if (stats.size > MAX_RAY_ENV_FILE_BYTES) {
              throw new Error(`Ray env file must be at most ${MAX_RAY_ENV_FILE_BYTES} bytes`);
            }
            const contents = readFileSync(filePath, "utf8");
            if (Buffer.byteLength(contents, "utf8") > MAX_RAY_ENV_FILE_BYTES) {
              throw new Error(`Ray env file must be at most ${MAX_RAY_ENV_FILE_BYTES} bytes`);
            }
            return contents;
          }

          const env = {
            ...process.env,
            ...parseEnvironmentFile(readRayEnvFileBounded("/etc/ray/ray.env")),
          };
          const { config } = await loadRayConfig({
            cwd: "/srv/ray",
            configPath: "/etc/ray/ray.json",
            env,
          });
          process.exit(
            config.model.adapter.kind === "llama.cpp" && config.model.adapter.launchProfile
              ? 0
              : 1,
          );
          ' || LLAMA_CONFIG_STATUS=$?
          if [ "$LLAMA_CONFIG_STATUS" = "0" ]; then
            echo "::group::Resolved llama.cpp artifact staging plan"
            timeout 120s $SUDO /usr/local/bin/bun /srv/ray/scripts/model-stage.ts \
              --cwd /srv/ray \
              --config /etc/ray/ray.json \
              --user "$SERVICE_USER" \
              --group "$SERVICE_GROUP" \
              --ray-env-file /etc/ray/ray.env
            echo "::endgroup::"

            SOURCE_CHECK_STATUS=0
            timeout 30s $SUDO /usr/local/bin/bun --eval '
            import { readFileSync, statSync } from "node:fs";
            import { parseEnvironmentFile } from "/srv/ray/packages/deploy/dist/cli.js";

            const MAX_RAY_ENV_FILE_BYTES = 64 * 1024;
            function readRayEnvFileBounded(filePath) {
              const stats = statSync(filePath);
              if (!stats.isFile()) {
                throw new Error(`Ray env path must be a file: ${filePath}`);
              }
              if (stats.size > MAX_RAY_ENV_FILE_BYTES) {
                throw new Error(`Ray env file must be at most ${MAX_RAY_ENV_FILE_BYTES} bytes`);
              }
              const contents = readFileSync(filePath, "utf8");
              if (Buffer.byteLength(contents, "utf8") > MAX_RAY_ENV_FILE_BYTES) {
                throw new Error(`Ray env file must be at most ${MAX_RAY_ENV_FILE_BYTES} bytes`);
              }
              return contents;
            }

            const env = parseEnvironmentFile(readRayEnvFileBounded("/etc/ray/ray.env"));
            const hasBinarySource =
              typeof env.RAY_LLAMA_CPP_BINARY_SOURCE_PATH === "string" &&
              env.RAY_LLAMA_CPP_BINARY_SOURCE_PATH.trim().length > 0;
            const hasModelSource =
              typeof env.RAY_MODEL_SOURCE_PATH === "string" &&
              env.RAY_MODEL_SOURCE_PATH.trim().length > 0;
            process.exit(hasBinarySource && hasModelSource ? 0 : hasBinarySource || hasModelSource ? 2 : 1);
            ' || SOURCE_CHECK_STATUS=$?
            if [ "$SOURCE_CHECK_STATUS" = "0" ]; then
              echo "::group::Stage llama.cpp artifact files"
              if ! timeout 1800s $SUDO /usr/local/bin/bun /srv/ray/scripts/model-stage.ts \
                --cwd /srv/ray \
                --config /etc/ray/ray.json \
                --user "$SERVICE_USER" \
                --group "$SERVICE_GROUP" \
                --ray-env-file /etc/ray/ray.env \
                --apply; then
                echo "::endgroup::"
                exit 1
              fi
              echo "::endgroup::"
            elif [ "$SOURCE_CHECK_STATUS" = "2" ]; then
              echo "::warning::Set both RAY_LLAMA_CPP_BINARY_SOURCE_PATH and RAY_MODEL_SOURCE_PATH to enable deploy-time artifact staging."
            elif [ "$SOURCE_CHECK_STATUS" != "1" ]; then
              echo "Failed to inspect llama.cpp artifact staging source environment."
              exit "$SOURCE_CHECK_STATUS"
            fi
          elif [ "$LLAMA_CONFIG_STATUS" = "1" ]; then
            echo "No generated llama.cpp artifact staging plan for this config."
          else
            echo "Failed to inspect resolved Ray config for a llama.cpp launch profile."
            exit "$LLAMA_CONFIG_STATUS"
          fi

          timeout 180s $SUDO /usr/local/bin/bun /srv/ray/packages/deploy/dist/cli.js doctor \
            --cwd /srv/ray \
            --config /etc/ray/ray.json \
            --user "$SERVICE_USER" \
            --gateway-runtime-binary "$GATEWAY_RUNTIME_BINARY" \
            "${CADDY_ARGS[@]}" \
            --ray-env-file /etc/ray/ray.env

          RENDER_DIR="$(mktemp -d)"
          CADDY_TMP=""
          cleanup_render_dir() {
            rm -rf "$RENDER_DIR"
            if [ -n "$CADDY_TMP" ]; then
              rm -f "$CADDY_TMP"
            fi
          }
          trap cleanup_render_dir EXIT

          timeout 120s $SUDO /usr/local/bin/bun /srv/ray/packages/deploy/dist/cli.js render \
            --cwd /srv/ray \
            --config /etc/ray/ray.json \
            --user "$SERVICE_USER" \
            --domain "$DEPLOY_DOMAIN" \
            --gateway-runtime-binary "$GATEWAY_RUNTIME_BINARY" \
            "${CADDY_ARGS[@]}" \
            --ray-env-file /etc/ray/ray.env \
            --strict-filesystem \
            --output-dir "$RENDER_DIR" >/dev/null

          timeout 60s $SUDO cp "$RENDER_DIR/ray-gateway.service" /etc/systemd/system/ray-gateway.service
          if [ "${INSTALL_CADDY:-false}" = "true" ]; then
            CADDY_TMP="$(mktemp)"
            timeout 30s cp "$RENDER_DIR/Caddyfile" "$CADDY_TMP"
            timeout 30s $SUDO "$CADDY_RUNTIME" validate --config "$CADDY_TMP"
            timeout 60s $SUDO install -m 0644 "$CADDY_TMP" /etc/caddy/Caddyfile
          fi
          if [ -f "$RENDER_DIR/ray-llama-cpp.service" ]; then
            timeout 60s $SUDO cp "$RENDER_DIR/ray-llama-cpp.service" /etc/systemd/system/ray-llama-cpp.service
          else
            if [ -f /etc/systemd/system/ray-llama-cpp.service ]; then
              timeout 60s $SUDO systemctl disable --now ray-llama-cpp.service || true
            fi
            timeout 60s $SUDO rm -f /etc/systemd/system/ray-llama-cpp.service
          fi

          timeout 60s $SUDO chown "$SERVICE_USER:$SERVICE_GROUP" /var/lib/ray /var/lib/ray/models /var/lib/ray/async-queue
          timeout 60s $SUDO systemctl daemon-reload
          if [ -f /etc/systemd/system/ray-llama-cpp.service ]; then
            if ! timeout 60s $SUDO systemctl enable ray-llama-cpp.service; then
              echo "Failed to enable ray-llama-cpp.service."
              dump_service_debug ray-llama-cpp.service
              exit 1
            fi
            if ! timeout 60s $SUDO systemctl restart ray-llama-cpp.service; then
              echo "Failed to restart ray-llama-cpp.service."
              dump_service_debug ray-llama-cpp.service
              exit 1
            fi
          fi
          if ! timeout 60s $SUDO systemctl enable ray-gateway.service; then
            echo "Failed to enable ray-gateway.service."
            dump_service_debug ray-gateway.service
            exit 1
          fi
          if ! timeout 60s $SUDO systemctl restart ray-gateway.service; then
            echo "Failed to restart ray-gateway.service."
            dump_ray_debug
            exit 1
          fi

          live_deadline=$((SECONDS + 30))
          live_status=1
          while [ "$SECONDS" -lt "$live_deadline" ]; do
            if curl -fsS --connect-timeout 2 --max-time 5 "http://127.0.0.1:${HEALTH_PORT}/livez" >/dev/null; then
              live_status=0
              break
            fi
            sleep 1
          done

          if [ "$live_status" -ne 0 ]; then
            echo "Ray gateway did not expose /livez within 30s."
            dump_ray_debug
            exit 1
          fi

          ready_deadline=$((SECONDS + READY_TIMEOUT_SECONDS))
          ready_status=1
          ready_snapshot=""
          while [ "$SECONDS" -lt "$ready_deadline" ]; do
            if ready_snapshot="$(curl -fsS --connect-timeout 2 --max-time 5 "http://127.0.0.1:${HEALTH_PORT}/readyz" 2>/dev/null)"; then
              ready_status=0
              break
            fi
            ready_snapshot="$(curl -sS --connect-timeout 2 --max-time 5 "http://127.0.0.1:${HEALTH_PORT}/readyz" 2>/dev/null || true)"
            sleep 2
          done

          if [ "$ready_status" -ne 0 ]; then
            echo "Ray gateway did not become backend-ready within ${READY_TIMEOUT_SECONDS}s."
            echo "::group::Ray health snapshots"
            curl -sS --connect-timeout 2 --max-time 5 "http://127.0.0.1:${HEALTH_PORT}/livez" || true
            echo
            if [ -n "$ready_snapshot" ]; then
              printf '%s\n' "$ready_snapshot"
            else
              curl -sS --connect-timeout 2 --max-time 5 "http://127.0.0.1:${HEALTH_PORT}/readyz" || true
            fi
            echo
            echo "::endgroup::"
            dump_ray_debug
            exit 1
          fi

          echo "::group::Ray readiness snapshot"
          printf '%s\n' "$ready_snapshot"
          echo "::endgroup::"

          if [ "${INSTALL_CADDY:-false}" = "true" ]; then
            if ! timeout 60s $SUDO systemctl enable --now caddy; then
              echo "Failed to enable or start caddy.service."
              dump_service_debug caddy.service
              exit 1
            fi
            if ! timeout 60s $SUDO systemctl reload caddy; then
              echo "Failed to reload caddy.service."
              dump_service_debug caddy.service
              exit 1
            fi
          fi
          ENDSSH

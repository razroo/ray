name: "@razroo/ray-core Release to npm"

# Publish when a GitHub Release whose tag starts with `core-v` is published.
#
# Cutting a release (after bumping packages/core/package.json version):
#   TAG="core-v$(bun -e 'console.log(require("./packages/core/package.json").version)')"
#   git tag "$TAG" && git push origin "$TAG"
#   gh release create "$TAG" --generate-notes --title "$TAG"

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    working-directory: packages/core

jobs:
  publish:
    if: startsWith(github.ref_name, 'core-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Set version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#core-v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Verify Quality checks passed for release commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Verifying Quality checks status for $SHA"
          # Wait for the push-triggered `quality` check-run on this exact commit
          # (same pattern as geometra). `release: published` often fires before
          # that check-run exists — polling avoids publishing on red or missing CI.
          DEADLINE=$(( $(date +%s) + 1800 ))
          STATUS=""
          CONCLUSION=""
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            read -r STATUS CONCLUSION <<<"$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
              --jq '[.check_runs[] | select(.name == "quality")] | sort_by(.started_at) | last | "\(.status // "missing") \(.conclusion // "null")"')"
            echo "quality check-run: status=$STATUS conclusion=$CONCLUSION"
            if [ "$STATUS" = "completed" ]; then
              break
            fi
            sleep 15
          done
          if [ "$STATUS" != "completed" ]; then
            echo "::error::Quality checks for $SHA never completed within 30min (last status: $STATUS)."
            exit 1
          fi
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Quality checks for $SHA did not succeed (conclusion: $CONCLUSION). Fix before re-releasing."
            exit 1
          fi
          echo "Quality checks succeeded for $SHA"

      - name: Verify package.json version matches release tag
        run: bun ./scripts/release/check-source.mjs "$VERSION"

      - name: Install (workspace root)
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build
        run: bun run build
        working-directory: .

      - name: Pack package
        id: pack
        run: |
          set -euo pipefail
          PACK_DIR="$RUNNER_TEMP/ray-packs"
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR"
          bun pm pack --destination "$PACK_DIR"
          TARBALL="$(find "$PACK_DIR" -name '*.tgz' -print -quit)"
          if [ -z "$TARBALL" ]; then
            echo "::error::Bun did not produce a package tarball."
            exit 1
          fi
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish to npm (with provenance)
        working-directory: .
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
